<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Race</title>
  <link rel="stylesheet" href="./fonts/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cyan: #00F5FF;
      --pink: #FF006E;
      --purple: #9D4EDD;
      --deep: #0A0E27;
      --white: #FFFFFF;
    }
    body { background: var(--deep); color: var(--cyan); font-family: 'Rajdhani', sans-serif; overflow: hidden; }
    #game-container { width: 100vw; height: 100vh; }

    #mode-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--deep);
      z-index: 100;
    }
    #mode-screen h1 {
      font-family: 'Audiowide', sans-serif;
      font-size: 3rem; color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
      margin-bottom: 3rem; letter-spacing: 0.2em;
    }
    .mode-btn {
      padding: 1rem 2rem; margin: 0.5rem;
      background: transparent; border: 2px solid var(--cyan);
      color: var(--cyan); font-family: 'Rajdhani', sans-serif; font-size: 1.2rem;
      cursor: pointer; transition: all 0.3s;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .mode-btn:hover {
      background: var(--cyan); color: var(--deep);
      box-shadow: 0 0 30px var(--cyan);
    }
    #waiting {
      display: none; margin-top: 2rem;
      font-size: 1.5rem; color: var(--cyan); font-family: 'VT323', monospace;
      text-shadow: 0 0 10px var(--cyan);
    }

    #hud {
      display: none;
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 50;
    }
    .hud-panel {
      position: absolute;
      background: rgba(10, 14, 39, 0.85);
      border: 1px solid var(--cyan);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.3), inset 0 0 20px rgba(0, 245, 255, 0.05);
      padding: 0.75rem 1rem;
    }
    #hud-tl { top: 20px; left: 20px; }
    #hud-tc {
      top: 20px; left: 50%; transform: translateX(-50%);
      width: 420px;
      padding: 0.5rem 1rem 0.75rem;
    }
    #hud-tr { top: 20px; right: 20px; }
    #hud-br { bottom: 20px; right: 20px; }

    /* Top-center: progress bar with 4 checkpoint markers + 2 player dots */
    .hud-progress-track {
      position: relative;
      width: 100%; height: 14px;
      background: rgba(0, 245, 255, 0.08);
      border: 1px solid rgba(0, 245, 255, 0.4);
      margin: 0.3rem 0;
    }
    .hud-progress-fill {
      position: absolute; top: 0; left: 0; height: 100%; width: 0;
      background: linear-gradient(90deg, var(--pink) 0%, var(--cyan) 100%);
      transition: width 0.2s linear;
      box-shadow: 0 0 10px var(--cyan);
    }
    .hud-cp-marker {
      position: absolute; top: -3px; width: 3px; height: 20px;
      background: var(--cyan); opacity: 0.6;
      transform: translateX(-1.5px);
    }
    .hud-cp-marker.hud-cp-finish {
      background: var(--pink); width: 4px;
      box-shadow: 0 0 8px var(--pink);
    }
    .hud-cp-player, .hud-cp-ai {
      position: absolute; top: 50%;
      width: 12px; height: 12px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: left 0.2s linear;
    }
    .hud-cp-player { background: var(--pink); box-shadow: 0 0 8px var(--pink); }
    .hud-cp-ai     { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
    .hud-progress-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; color: var(--cyan);
      text-transform: uppercase; letter-spacing: 0.1em;
      display: flex; justify-content: space-between;
    }
    #hud-bl { bottom: 20px; left: 20px; }

    .hud-pos {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700; font-size: 4rem;
      color: var(--cyan); line-height: 1;
      text-shadow: 0 0 20px var(--cyan);
    }
    .hud-pos-label {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500; font-size: 0.9rem;
      color: rgba(0, 245, 255, 0.6); text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .hud-lap {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600; font-size: 1.5rem;
      color: var(--pink); text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .hud-lap span { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 2rem; }
    .hud-lap-label {
      font-size: 0.75rem; color: rgba(255, 0, 110, 0.6);
      text-transform: uppercase; letter-spacing: 0.1em;
    }

    .hud-speed {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500; font-size: 2.5rem;
      color: var(--cyan); text-align: right;
      text-shadow: 0 0 15px var(--cyan);
    }
    .hud-speed-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem; color: rgba(0, 245, 255, 0.6);
      text-transform: uppercase; letter-spacing: 0.1em; text-align: right;
    }

    #hud-wrongway {
      position: absolute;
      bottom: 140px; left: 50%; transform: translateX(-50%);
      font-family: 'VT323', monospace; font-size: 4.5rem;
      color: var(--pink); text-shadow: 0 0 20px var(--pink), 0 0 40px var(--pink);
      opacity: 0; transition: opacity 0.2s;
      text-transform: uppercase; letter-spacing: 0.25em;
      font-weight: bold;
      pointer-events: none;
    }
    #hud-wrongway.visible { opacity: 1; animation: wrongway-pulse 0.5s ease-in-out infinite; }
    #hud-wrongway .arrow {
      display: inline-block;
      margin: 0 0.5em;
      font-size: 5rem;
      vertical-align: middle;
    }
    @keyframes wrongway-pulse {
      0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
      50%      { transform: translateX(-50%) scale(1.08); filter: brightness(1.4); }
    }

    .hud-controls {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem; color: rgba(0, 245, 255, 0.4);
      margin-top: 0.5rem; text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #version-badge {
      position: fixed; bottom: 8px; right: 12px;
      font-size: 0.65rem; color: #333;
      z-index: 50; pointer-events: none;
    }

    #end-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10, 14, 39, 0.95);
      align-items: center; justify-content: center;
      flex-direction: column; z-index: 200;
    }
    #end-screen h2 {
      font-family: 'Audiowide', sans-serif;
      font-size: 4rem; text-shadow: 0 0 30px currentColor;
      margin-bottom: 2rem;
    }
    #end-screen.win h2 { color: var(--cyan); }
    #end-screen.lose h2 { color: var(--pink); }

    #scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1000;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container"></div>

  <div id="mode-screen">
    <h1>CYBERPUNK RACE</h1>
    <button class="mode-btn" id="btn-ai">Human vs AI</button>
    <button class="mode-btn" id="btn-hvh">Human vs Human</button>
    <div id="waiting">Waiting for opponent...</div>
  </div>

  <div id="hud">
    <!-- Top-center: Lap progress bar with checkpoint markers (Mario Kart style) -->
    <div id="hud-tc" class="hud-panel">
      <div class="hud-progress-label">Progress</div>
      <div class="hud-progress-track">
        <div class="hud-progress-fill" id="progress-fill"></div>
        <div class="hud-cp-marker" data-cp="0" style="left:0%"></div>
        <div class="hud-cp-marker" data-cp="1" style="left:25%"></div>
        <div class="hud-cp-marker" data-cp="2" style="left:50%"></div>
        <div class="hud-cp-marker" data-cp="3" style="left:75%"></div>
        <div class="hud-cp-marker hud-cp-finish" data-cp="0" style="left:100%"></div>
        <div class="hud-cp-player" id="progress-player"></div>
        <div class="hud-cp-ai" id="progress-ai"></div>
      </div>
      <div class="hud-progress-label" id="next-cp-label">Next: CP1</div>
    </div>

    <div id="hud-tl" class="hud-panel">
      <div class="hud-pos-label">Position</div>
      <div class="hud-pos"><span id="pos-display">01</span><span style="font-size:1.5rem;opacity:0.4"> / 02</span></div>
    </div>
    <div id="hud-tr" class="hud-panel">
      <div class="hud-lap-label">Lap</div>
      <div class="hud-lap"><span id="lap-current">1</span> / <span id="lap-total">3</span></div>
    </div>
    <div id="hud-br" class="hud-panel">
      <div class="hud-speed-label">Speed</div>
      <div class="hud-speed"><span id="speed-display">0</span></div>
      <div class="hud-speed-label">km/h</div>
    </div>
    <div id="hud-bl" class="hud-panel">
      <svg width="140" height="140" viewBox="0 0 140 140" id="minimap">
        <rect width="140" height="140" fill="rgba(10,14,39,0.5)" rx="4"/>
        <ellipse cx="70" cy="70" rx="25" ry="55" fill="none" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
        <ellipse cx="70" cy="70" rx="18" ry="48" fill="none" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
        <circle id="minimap-player" cx="70" cy="115" r="4" fill="#FF006E"/>
        <circle id="minimap-ai" cx="70" cy="25" r="4" fill="#9D4EDD"/>
      </svg>
      <div class="hud-controls">WASD / Arrows</div>
    </div>
    <div id="hud-wrongway"><span class="arrow">↶</span>WRONG WAY<span class="arrow">↷</span></div>
  </div>

  <div id="end-screen">
    <h2 id="end-title">WINNER</h2>
    <div style="display:flex;gap:1rem">
      <button class="mode-btn" id="btn-restart">Race Again</button>
      <button class="mode-btn" id="btn-back-menu">Back to Menu</button>
    </div>
  </div>

  <div id="scanlines"></div>
  <div id="version-badge"></div>

  <script type="module" src="/src/client.js"></script>
</body>
</html>
