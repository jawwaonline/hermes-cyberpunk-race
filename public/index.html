<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Race</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; }
    #game-container { width: 100vw; height: 100vh; }

    #mode-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f;
      z-index: 100;
    }
    #mode-screen h1 {
      font-size: 3rem; text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      margin-bottom: 3rem; letter-spacing: 0.2em;
    }
    .mode-btn {
      padding: 1rem 2rem; margin: 0.5rem;
      background: transparent; border: 2px solid #0ff;
      color: #0ff; font-family: inherit; font-size: 1.2rem;
      cursor: pointer; transition: all 0.3s;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .mode-btn:hover {
      background: #0ff; color: #0a0a0f;
      box-shadow: 0 0 30px #0ff;
    }
    #waiting {
      display: none; margin-top: 2rem;
      font-size: 1.5rem; text-shadow: 0 0 10px #0ff;
    }

    #hud {
      display: none;
      position: fixed; top: 20px; left: 20px;
      padding: 1rem; background: rgba(10,10,15,0.85);
      border: 1px solid #0ff; box-shadow: 0 0 15px rgba(0,255,255,0.3);
      z-index: 50; min-width: 180px;
    }
    #hud .lap { font-size: 1.4rem; margin-bottom: 0.5rem; }
    #hud .pos { font-size: 1.2rem; color: #f0f; margin-bottom: 0.5rem; }
    #hud .speed { font-size: 1rem; color: #ff0; }

    #end-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,10,15,0.95);
      align-items: center; justify-content: center;
      flex-direction: column; z-index: 200;
    }
    #end-screen h2 {
      font-size: 4rem; text-shadow: 0 0 30px currentColor;
      margin-bottom: 2rem;
    }
    #end-screen.win h2 { color: #0ff; }
    #end-screen.lose h2 { color: #f0f; }

    #scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1000;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
      );
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="game-container"></div>

  <div id="mode-screen">
    <h1>CYBERPUNK RACE</h1>
    <button class="mode-btn" id="btn-ai">Human vs AI</button>
    <button class="mode-btn" id="btn-hvh">Human vs Human</button>
    <div id="waiting">Waiting for opponent...</div>
  </div>

  <div id="hud">
    <div class="lap">Lap <span id="lap-current">1</span>/3</div>
    <div class="pos">Position: <span id="pos-display">1st</span></div>
    <div class="speed"><span id="speed-display">0</span> km/h</div>
  </div>

  <div id="end-screen">
    <h2 id="end-title">WINNER</h2>
    <button class="mode-btn" id="btn-restart">Race Again</button>
  </div>

  <div id="scanlines"></div>

  <script type="module" src="/src/client.js"></script>
</body>
</html>
